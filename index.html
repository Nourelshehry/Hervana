<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hervana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
<header>
  <div class="logo">Hervana</div>
  <nav>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
    <div class="menu-toggle">&#9776;</div> <!-- ☰ -->
  </nav>
</header>


  <!-- Hero Section with Slider -->
  <section class="hero">
    <div class="hero-slider">
      <img src="Hervana.jpg" alt="Hervana" class="active">
      <img src="Gift1.png" alt="Gift 1">
      <img src="Gift2.png" alt="Gift 2">
    </div>
    <div class="hero-content">
      <h1>Welcome to Hervana</h1>
      <p>Find the perfect gift for every occasion</p>
      <button>Shop Now</button>
    </div>
    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>
  </section>

  <!-- Products Section -->
  <section class="products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Gift 1">
        <h3>Gift 1</h3>
        <p>150 EGP</p>
        <button>Order Now</button>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Gift 2">
        <h3>Gift 2</h3>
        <p>200 EGP</p>
        <button>Order Now</button>
      </div>
      <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Gift 3">
        <h3>Gift 3</h3>
        <p>250 EGP</p>
        <button>Order Now</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Hervana. All rights reserved.</p>
    <div class="social-links">
      <a href="#">Facebook</a> |
      <a href="#">Instagram</a> |
      <a href="#">WhatsApp</a>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="script.js"></script>
<script>
  const menuToggle = document.getElementById("menu-toggle");
  const nav = document.getElementById("nav");

  menuToggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });
</script>
</body>
</html>
