<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hervana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- الهيدر ثابت -->
  <header id="main-header">
    <div class="logo">Hervana</div>
    <nav>
      <ul class="menu">
        <li><a href="#">الرئيسية</a></li>
        <li><a href="#">المنتجات</a></li>
        <li><a href="#">عن الموقع</a></li>
        <li><a href="#">اتصل بنا</a></li>
      </ul>
    </nav>
    <div id="cart-btn">🛒</div>
  </header>

  <!-- الكارت -->
  <div id="cart-sidebar">
    <div id="cart-close">×</div>
    <h2>عربة التسوق</h2>
    <div id="cart-items">
      <p>لا توجد منتجات بعد</p>
    </div>
  </div>

  <!-- السلايدر -->
  <section id="hero-slider">
    <div class="slide active">
      <img src="https://via.placeholder.com/1200x600" alt="Slide 1">
      <div class="slide-text">منتج مميز</div>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/1200x600/ff9999" alt="Slide 2">
      <div class="slide-text">منتج رائع آخر</div>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/1200x600/99ff99" alt="Slide 3">
      <div class="slide-text">منتج جديد</div>
    </div>
    <button class="prev">‹</button>
    <button class="next">›</button>
  </section>

  <!-- المنتجات -->
  <main>
    <section class="products">
      <h2>منتجاتنا</h2>
      <div class="product-list">
        <div class="product">
          <img src="https://via.placeholder.com/300" alt="منتج 1">
          <h3>منتج 1</h3>
          <button class="add-to-cart">أضف للعربة</button>
        </div>
        <div class="product">
          <img src="https://via.placeholder.com/300" alt="منتج 2">
          <h3>منتج 2</h3>
          <button class="add-to-cart">أضف للعربة</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="cart.js"></script>
</body>
</html>
