<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hervana</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- الهيدر -->
  <header class="header">
    <div class="container header-container">
      <h1 class="logo">Hervana</h1>
      <nav class="nav">
        <ul>
          <li><a href="#">الرئيسية</a></li>
          <li><a href="#">المنتجات</a></li>
          <li><a href="#">عروضنا</a></li>
          <li><a href="#">تواصل معنا</a></li>
        </ul>
      </nav>
      <div class="mobile-menu-toggle">&#9776;</div>
    </div>
  </header>

  <!-- سلايدر -->
  <section class="slider">
    <div class="slider-item active" style="background-image: url('images/slider1.jpg');">
      <div class="slider-content">
        <h2>اكتشف تشكيلتنا الجديدة</h2>
        <a href="#" class="btn">تسوق الآن</a>
      </div>
    </div>
    <div class="slider-item" style="background-image: url('images/slider2.jpg');">
      <div class="slider-content">
        <h2>أفضل العروض لهذا الشهر</h2>
        <a href="#" class="btn">اكتشف العروض</a>
      </div>
    </div>
  </section>

  <!-- منتجات مميزة -->
  <section class="featured-products container">
    <h2>منتجات مميزة</h2>
    <div class="products-grid">
      <div class="product-card">
        <img src="images/product1.jpg" alt="منتج 1">
        <h3>منتج 1</h3>
        <p>وصف قصير للمنتج</p>
        <button class="btn">أضف إلى السلة</button>
      </div>
      <div class="product-card">
        <img src="images/product2.jpg" alt="منتج 2">
        <h3>منتج 2</h3>
        <p>وصف قصير للمنتج</p>
        <button class="btn">أضف إلى السلة</button>
      </div>
      <div class="product-card">
        <img src="images/product3.jpg" alt="منتج 3">
        <h3>منتج 3</h3>
        <p>وصف قصير للمنتج</p>
        <button class="btn">أضف إلى السلة</button>
      </div>
    </div>
  </section>

  <!-- فوتر -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Hervana. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
