<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hervana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER ثابت فوق الكل -->
  <header id="main-header">
    <div class="logo">Hervana</div>
    <nav>
      <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div id="cart-btn">🛒</div>
  </header>

  <!-- CART Sidebar -->
  <div id="cart-sidebar">
    <div id="cart-close">×</div>
    <h2>Cart</h2>
    <div id="cart-items">
      <p>No items yet</p>
    </div>
  </div>

  <!-- Hero Slider -->
  <section id="hero-slider">
    <div class="slide active">
      <img src="https://via.placeholder.com/1200x600" alt="Slide 1">
      <div class="slide-text">Welcome to Hervana</div>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/1200x600/ff9999" alt="Slide 2">
      <div class="slide-text">Our New Collection</div>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/1200x600/99ff99" alt="Slide 3">
      <div class="slide-text">Shop Now</div>
    </div>
    <button class="prev">‹</button>
    <button class="next">›</button>
  </section>

  <!-- Main content -->
  <main>
    <section class="products">
      <h2>Featured Products</h2>
      <div class="product-list">
        <div class="product">
          <img src="https://via.placeholder.com/300" alt="Product 1">
          <h3>Product 1</h3>
          <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product">
          <img src="https://via.placeholder.com/300" alt="Product 2">
          <h3>Product 2</h3>
          <button class="add-to-cart">Add to Cart</button>
        </div>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
