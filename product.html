<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product - Hervana</title>
  <link rel="stylesheet" href="all-products.css"/>
  <link rel="stylesheet" href="product.css"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo"><a href="index.html">Hervana</a></div>
    <div class="menu-cart">
      <a href="all-products.html" class="back-btn">← Back to Products</a>
      <div id="cart-btn">🛒 <span id="cart-count"></span></div>
    </div>
  </header>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar" class="cart-sidebar">
    <button id="close-cart">✖</button>
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <button id="checkout-btn">Checkout</button>
  </div>

  <!-- Main Product Section -->
  <section class="product-page">
    <div class="product-container">
      <!-- صور المنتج -->
      <div class="product-images">
        <img id="main-image" src="Gift1.png" alt="Product" />
        <div class="image-thumbs">
          <img src="Gift1.png" alt="Thumb 1"/>
          <img src="Gift2.png" alt="Thumb 2"/>
          <img src="Gift3.jpg" alt="Thumb 3"/>
        </div>
      </div>

      <!-- تفاصيل المنتج -->
      <div class="product-details">
        <h1 id="product-name">Gift 1</h1>
        <p id="product-description">
          This is a lovely handcrafted gift item, perfect for your special occasions ❤️.
        </p>
        <p class="price">Price: <span id="product-price">$15.00</span></p>
        <p id="product-stock" class="in-stock">In Stock</p>

        <!-- اختيار الكمية -->
        <div class="quantity-box">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" min="1" value="1"/>
        </div>

        <!-- زرار إضافة للكارت -->
        <button 
          class="add-to-cart" 
          data-name="Gift 1" 
          data-price="15">
          Add to Cart
        </button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Hervana. All rights reserved.</p>
  </footer>

  <!-- Cart + Product Scripts -->
  <script src="cart.js"></script>
  <script src="product.js"></script>

  <!-- رسالة Added to Cart -->
  <div id="cart-message" class="cart-message"></div>

</body>
</html>
