<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation</title>
  <link rel="stylesheet" href="all-products.css">
</head>
<body>
  <header>
    <h1>Order Confirmation</h1>
  </header>

  <section class="order-section">
    <div class="order-container">
      <h2>Your Order</h2>
      <ul id="order-summary"></ul>
      <p>Total: $<span id="order-total">0</span></p>

      <form id="order-form">
        <label for="name">Name:</label>
        <input type="text" id="name" required />

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" required />

        <label for="address">Address:</label>
        <textarea id="address" required></textarea>

        <button type="submit">Confirm Order</button>
      </form>
    </div>
  </section>

  <!-- رسالة الشكر -->
  <div id="thank-you" class="thank-you">
    <div class="thank-you-content">
      <h2>شكراً لطلبك 🎉</h2>
      <p>تم تأكيد الطلب وسنتواصل معك قريباً</p>
      <button onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("7hqQN_HKaAyPHjqYu");
    })();

    const orderSummary = document.getElementById("order-summary");
    const orderTotal = document.getElementById("order-total");
    const orderForm = document.getElementById("order-form");
    const thankYou = document.getElementById("thank-you");

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    // عرض المنتجات
    let total = 0;
    cart.forEach(item => {
      const li = document.createElement("li");
      li.textContent = `${item.name} - $${item.price} x${item.quantity}`;
      orderSummary.appendChild(li);
      total += item.price * item.quantity;
    });
    orderTotal.textContent = total.toFixed(2);

    // عند إرسال الفورم
    orderForm.addEventListener("submit", function(e){
      e.preventDefault();

      const orderData = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        items: cart.map(i => `${i.name} x${i.quantity}`).join(", "),
        total: total
      };

      // حفظ الطلبات في localStorage
      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders.push(orderData);
      localStorage.setItem("orders", JSON.stringify(orders));

      // إرسال عبر EmailJS
      emailjs.send("service_7bn78p4", "template_3eu20q2", orderData)
        .then(() => {
          localStorage.removeItem("cart");
          // إظهار الرسالة كمودال
          thankYou.classList.add("show");
        })
        .catch(err => console.error("EmailJS error:", err));
    });
  </script>
</body>
</html>
