<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Order - Hervana</title>
  <link rel="stylesheet" href="all-products.css">
</head>
<body>

<header>
  <div class="logo"><a href="index.html">Hervana</a></div>
</header>

<section class="order-section">
  <div class="order-container">
    <h1>Complete Your Order</h1>

    <!-- Order Form -->
    <form id="order-form">
      <div class="form-group">
        <label for="name">Full Name:</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form-group">
        <label for="address">Address:</label>
        <textarea id="address" required></textarea>
      </div>

      <button type="submit">Confirm Order</button>
    </form>
  </div>
</section>

<!-- ✅ رسالة الشكر كـ مودال -->
<div id="thank-you" class="thank-you">
  <div class="thank-you-content">
    <h2>شكراً لطلبك 🎉</h2>
    <p>تم تأكيد الطلب وسنتواصل معك قريباً</p>
    <button onclick="window.location.href='index.html'">العودة للرئيسية</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
<script>
  (function() {
    emailjs.init("7hqQN_HKaAyPHjqYu");
  })();

  const orderForm = document.getElementById("order-form");
  const thankYou = document.getElementById("thank-you");

  orderForm.addEventListener("submit", function(e) {
    e.preventDefault();

    const orderData = {
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value
    };

    // إرسال عبر EmailJS
    emailjs.send("service_7bn78p4", "template_3eu20q2", orderData)
      .then(() => {
        // إظهار المودال
        thankYou.classList.add("show");
        // تفريغ الفورم
        orderForm.reset();
      })
      .catch(err => console.error("EmailJS error:", err));
  });
</script>

</body>
</html>
