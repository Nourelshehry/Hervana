<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hervana - All Products</title>
  <link rel="stylesheet" href="all-products.css">
</head>
<body>

  <!-- Header -->
  <header>
  <div class="logo"><a href="index.html">Hervana</a></div>
</header>


  <!-- Filters -->
  <section class="filters">
    <label for="category">Category:</label>
    <select id="category">
      <option value="all">All</option>
      <option value="gift">Gifts</option>
      <option value="decor">Decor</option>
      <option value="accessory">Accessories</option>
    </select>

    <label for="price">Max Price ($):</label>
    <input type="number" id="price" min="0" placeholder="Any">
  </section>

  <!-- All Products Section -->
  <section class="all-products">
    <h1>All Products</h1>
    <div class="product-grid">
      <div class="product-card" data-category="gift" data-price="15">
        <img src="Gift1.jpg" alt="Gift 1">
        <h3>Gift 1</h3>
        <p>$15.00</p>
        <button>Order Now</button>
      </div>
      <div class="product-card" data-category="gift" data-price="20">
        <img src="Gift2.jpg" alt="Gift 2">
        <h3>Gift 2</h3>
        <p>$20.00</p>
        <button>Order Now</button>
      </div>
      <div class="product-card" data-category="decor" data-price="25">
        <img src="Gift3.jpg" alt="Gift 3">
        <h3>Decor 1</h3>
        <p>$25.00</p>
        <button>Order Now</button>
      </div>
      <div class="product-card" data-category="accessory" data-price="30">
        <img src="Gift4.jpg" alt="Gift 4">
        <h3>Accessory 1</h3>
        <p>$30.00</p>
        <button>Order Now</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Hervana. All rights reserved.</p>
    <div class="social-links">
      <a href="#">Facebook</a> |
      <a href="#">Instagram</a> |
      <a href="#">WhatsApp</a>
    </div>
  </footer>

  <script src="all-products.js"></script>
</body>
</html>
